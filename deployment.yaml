apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-hello-deployment
  labels:
    app: node-hello
spec:
  replicas: 3
  selector:
    matchLabels:
      app: node-hello
  template:
    metadata:
      labels:
        app: node-hello
    spec:
      containers:
      - name: node-hello
        # TODO: Replace with your actual image path
        image: your-docker-username/node-hello:latest
        ports:
        - containerPort: 3000
        imagePullPolicy: IfNotPresent